# =============================================================================
# Social Media / Forums
# =============================================================================
reddit:
  subreddits:
    - "Kenya"
    - "Nairobi"
    - "KenyanFood"
  sort: "top"
  time_filter: "all"
  min_score: 5
  min_comments: 3
  max_posts_per_sub: 2000

# =============================================================================
# Kenyan Government & Public Data
# =============================================================================
government:
  - name: "Kenya Law"
    base_url: "http://kenyalaw.org"
    description: "Constitution and legal resources"
  - name: "KNBS"
    base_url: "https://www.knbs.or.ke"
    description: "Kenya National Bureau of Statistics"

# =============================================================================
# Synthetic Data Generation (using LLM API)
# =============================================================================
synthetic:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  temperature: 0.8
  max_tokens: 2048
  batch_size: 10
  target_conversations: 10000

  # Topics to generate conversations about
  topic_categories:
    kenyan_history:
      - "Pre-colonial Kenya and ethnic kingdoms"
      - "Arab and Portuguese influence on the Coast"
      - "British colonization and the Kenya Colony"
      - "Mau Mau uprising and independence struggle"
      - "Jomo Kenyatta and early independence"
      - "Daniel arap Moi era and single-party rule"
      - "Multi-party democracy and 2002 transition"
      - "2007-2008 post-election violence"
      - "2010 Constitution and devolution"
      - "Recent political history"

    geography_environment:
      - "Kenya's 47 counties and their capitals"
      - "Great Rift Valley and geological features"
      - "Mount Kenya and highland regions"
      - "Coastal regions and Swahili Coast"
      - "Lake Victoria and western Kenya"
      - "Arid and semi-arid lands (ASALs)"
      - "National parks and game reserves"
      - "Climate zones and weather patterns"
      - "Environmental conservation efforts"
      - "Wildlife and Big Five"

    economy_business:
      - "M-Pesa and mobile money revolution"
      - "Safaricom and telecom industry"
      - "Nairobi as a tech hub (Silicon Savannah)"
      - "Agriculture: tea, coffee, flowers, horticulture"
      - "Tourism industry and safari economy"
      - "Real estate and construction boom"
      - "Banking and financial services"
      - "Small and medium enterprises (SMEs)"
      - "Import/export and trade"
      - "Employment and job market"
      - "Informal economy (jua kali)"
      - "Kenya Vision 2030"
      - "SGR and infrastructure projects"

    culture_society:
      - "42+ ethnic communities and their traditions"
      - "Kenyan cuisine: ugali, nyama choma, sukuma wiki, chapati, pilau"
      - "Kenyan music: benga, genge, gengetone, gospel"
      - "Kenyan fashion and style"
      - "Harambee spirit and community fundraising"
      - "Kenyan wedding traditions"
      - "Religious landscape: Christianity, Islam, traditional"
      - "Kenyan slang and Sheng language"
      - "Matatu culture"
      - "Kenyan comedy and entertainment"
      - "Social media trends in Kenya"
      - "Kenyan diaspora"

    languages:
      - "Swahili grammar and common phrases"
      - "Swahili proverbs and meanings"
      - "Sheng vocabulary and usage"
