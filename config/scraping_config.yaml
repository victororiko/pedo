# =============================================================================
# Elumina — Data Scraping Configuration
# =============================================================================

# Rate limiting (be respectful to servers)
scraping:
  requests_per_second: 1
  request_timeout: 30
  max_retries: 3
  retry_delay: 5
  user_agent: "EluminaDataCollector/1.0 (Research; Intevia Ltd; Nairobi Kenya)"

# =============================================================================
# Kenyan News & Media Sites
# =============================================================================
news_sites:
  - name: "Nation Africa"
    base_url: "https://nation.africa"
    sitemap_url: "https://nation.africa/sitemap.xml"
    selectors:
      article_body: "article, .article-body, .story-body"
      title: "h1"
      date: "time, .date, .published-date"
    categories:
      - "/kenya/"
      - "/kenya/news/"
      - "/kenya/counties/"
      - "/blogs/"

  - name: "The Standard"
    base_url: "https://www.standardmedia.co.ke"
    sitemap_url: "https://www.standardmedia.co.ke/sitemap.xml"
    selectors:
      article_body: ".article-body, .story-content"
      title: "h1"
      date: "time"
    categories:
      - "/kenya/"
      - "/counties/"
      - "/business/"
      - "/entertainment/"

  - name: "The Star Kenya"
    base_url: "https://www.the-star.co.ke"
    sitemap_url: "https://www.the-star.co.ke/sitemap.xml"
    selectors:
      article_body: ".article-body, .field-item"
      title: "h1"
      date: "time, .date"
    categories:
      - "/news/"
      - "/counties/"
      - "/business/"
      - "/culture/"

  - name: "Business Daily Africa"
    base_url: "https://www.businessdailyafrica.com"
    sitemap_url: "https://www.businessdailyafrica.com/sitemap.xml"
    selectors:
      article_body: ".article-body, .story-body"
      title: "h1"
      date: "time"
    categories:
      - "/economy/"
      - "/markets/"
      - "/corporate/"
      - "/technology/"

  - name: "Tuko News"
    base_url: "https://www.tuko.co.ke"
    sitemap_url: "https://www.tuko.co.ke/sitemap.xml"
    selectors:
      article_body: ".post-content, article"
      title: "h1"
      date: "time"
    categories:
      - "/kenya/"
      - "/entertainment/"
      - "/business-economy/"

  - name: "Kenyans.co.ke"
    base_url: "https://www.kenyans.co.ke"
    selectors:
      article_body: ".article-content, .post-body"
      title: "h1"
      date: "time, .date"
    categories:
      - "/news/"
      - "/entertainment/"
      - "/business/"

